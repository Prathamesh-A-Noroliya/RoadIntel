kind = "web"
previewPath = "/"
title = "RoadIntel"
version = "1.0.0"
id = "artifacts/roadintel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26176

[services.development]
run = "pnpm --filter @workspace/roadintel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roadintel", "run", "build" ]
publicDir = "artifacts/roadintel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26176"
BASE_PATH = "/"
